[package]
  cjc-version = "1.0.0"
  name = "physfs4cj"
  description = "physfs4cj; a portable, flexible file i/o abstraction library"
  version = "1.0.0"
  target-dir = ""
  src-dir = ""
  output-type = "dynamic"
  compile-option = "--dy-std -O1"
  override-compile-option = ""
  link-option = ""
  package-configuration = {}

[dependencies]
  cenum = { git = "https://github.com/causerp/cenum.git", tag = "v1.1.2"}

[ffi.c]
  physfs = { path = "./physfs/build/lib" }
